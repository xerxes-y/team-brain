<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="team-brain">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b5bf0"/>
      <stop offset="1" stop-color="#9b6bff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.55" fill="none">
    <!-- outer brain outline -->
    <path d="M256 128 L160 168 M256 128 L352 168 M160 168 L118 256 M352 168 L394 256 M118 256 L160 344 M394 256 L352 344 M160 344 L256 384 M352 344 L256 384"/>
    <!-- left hemisphere inner -->
    <path d="M160 168 L212 256 M118 256 L212 256 M160 344 L212 256"/>
    <!-- right hemisphere inner -->
    <path d="M352 168 L300 256 M394 256 L300 256 M352 344 L300 256"/>
    <!-- vertical spine -->
    <path d="M256 128 L256 256 M256 384 L256 256"/>
  </g>
  <!-- the bridge: PO <-> dev, highlighted in amber -->
  <path d="M212 256 L256 256 L300 256" stroke="#ffd166" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- nodes -->
  <g fill="#ffffff">
    <circle cx="256" cy="128" r="15"/>
    <circle cx="160" cy="168" r="15"/>
    <circle cx="352" cy="168" r="15"/>
    <circle cx="118" cy="256" r="15"/>
    <circle cx="394" cy="256" r="15"/>
    <circle cx="160" cy="344" r="15"/>
    <circle cx="352" cy="344" r="15"/>
    <circle cx="256" cy="384" r="15"/>
    <circle cx="212" cy="256" r="16"/>
    <circle cx="300" cy="256" r="16"/>
  </g>
  <!-- bridge center node -->
  <circle cx="256" cy="256" r="22" fill="#ffd166"/>
  <circle cx="256" cy="256" r="9" fill="#5b5bf0"/>
</svg>
