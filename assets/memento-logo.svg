<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#3b206e"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="moonGrad" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9d5ff"/>
    </radialGradient>
    <mask id="crescent">
      <rect width="512" height="512" fill="black"/>
      <circle cx="250" cy="258" r="124" fill="white"/>
      <circle cx="300" cy="226" r="116" fill="black"/>
    </mask>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background squircle -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>

  <!-- recall / sleep-cycle loop framing the moon -->
  <g stroke="#22d3ee" stroke-width="15" stroke-linecap="round" fill="none" opacity="0.95">
    <path d="M 256 86 A 170 170 0 1 1 110 172"/>
  </g>
  <!-- arrowhead on the loop -->
  <path d="M 256 64 L 256 108 L 292 86 Z" fill="#22d3ee"/>

  <!-- soft moon glow -->
  <rect width="512" height="512" fill="#c4b5fd" mask="url(#crescent)" filter="url(#soft)" opacity="0.55"/>
  <!-- crescent moon -->
  <rect width="512" height="512" fill="url(#moonGrad)" mask="url(#crescent)"/>

  <!-- stars -->
  <g fill="#f8fafc">
    <path d="M 150 120 l 6 16 l 16 6 l -16 6 l -6 16 l -6 -16 l -16 -6 l 16 -6 z" opacity="0.95"/>
    <circle cx="372" cy="150" r="6" opacity="0.8"/>
    <circle cx="392" cy="300" r="5" opacity="0.7"/>
    <circle cx="196" cy="372" r="5" opacity="0.6"/>
  </g>
</svg>
